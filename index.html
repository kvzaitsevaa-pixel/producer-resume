<!DOCTYPE html>
<html lang="ru" data-lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kseniia Zaitseva · Interpreter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E9EDE3;
    --paper-2:#F4F6F0;
    --ink:#1B2A28;
    --ink-soft:#4B5C58;
    --seal:#8C2F26;
    --brass:#A9863E;
    --teal:#1F5C56;
    --line: rgba(27,42,40,0.18);
    --line-strong: rgba(27,42,40,0.32);
    --font-display: 'Playfair Display', 'Noto Serif SC', serif;
    --font-body: 'Inter', 'Noto Sans SC', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  html[data-lang="zh"]{
    --font-display: 'Noto Serif SC', serif;
    --font-body: 'Noto Sans SC', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(27,42,40,0.06) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:56px 24px 80px;}
  a{color:var(--teal);}

  /* ---------- language switch ---------- */
  .langbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:28px;}
  .langbtn{
    font-family:var(--font-mono);
    font-size:12px;letter-spacing:.04em;
    background:var(--paper-2);
    border:1px solid var(--line-strong);
    color:var(--ink-soft);
    padding:6px 12px;border-radius:3px;
    cursor:pointer;
    transform:rotate(-2deg);
  }
  .langbtn:nth-child(2){transform:rotate(1.5deg);}
  .langbtn:nth-child(3){transform:rotate(-1deg);}
  .langbtn.active{
    color:var(--seal);
    border-color:var(--seal);
    background:#fff;
  }

  /* ---------- badge / hero ---------- */
  .badge{
    position:relative;
    background:var(--paper-2);
    border:1px solid var(--line-strong);
    border-radius:6px;
    padding:40px 32px 28px;
    margin-bottom:8px;
  }
  .badge::before{
    content:"";
    position:absolute;
    top:-9px;left:50%;transform:translateX(-50%);
    width:18px;height:18px;
    background:var(--paper);
    border:1px solid var(--line-strong);
    border-radius:50%;
  }
  .badge-inner{
    border:1px dashed var(--line-strong);
    border-radius:4px;
    padding:28px;
    display:flex;
    gap:24px;
    align-items:center;
  }
  .badge-photo{
    width:104px;height:104px;border-radius:6px;
    object-fit:cover;flex-shrink:0;
    border:1px solid var(--line-strong);
    filter:sepia(8%) saturate(92%);
  }
  .badge-text{flex:1;min-width:0;}
  .name{
    font-family:var(--font-display);
    font-weight:600;
    font-size:32px;line-height:1.1;
    margin:14px 0 2px;color:var(--ink);
  }
  .name-secondary{
    font-family:var(--font-display);
    font-size:16px;color:var(--ink-soft);
    margin:0 0 10px;
  }
  .role{font-size:15px;font-weight:500;margin:0 0 6px;color:var(--ink);}
  .tagline{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.5;}
  .badge-code{
    font-family:var(--font-mono);
    font-size:10.5px;letter-spacing:.06em;
    color:var(--ink-soft);
    border-top:1px solid var(--line);
    margin-top:20px;padding-top:12px;
    display:flex;justify-content:space-between;
  }

  /* ---------- contact row ---------- */
  .contacts{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0 44px;}
  .chip{
    display:flex;align-items:center;gap:7px;
    font-size:13px;font-weight:500;color:var(--ink);
    background:var(--paper-2);
    border:1px solid var(--line-strong);
    border-radius:999px;
    padding:8px 14px 8px 10px;
    text-decoration:none;
    cursor:pointer;
    position:relative;
  }
  .chip:hover{border-color:var(--seal);color:var(--seal);}
  .chip svg{width:15px;height:15px;flex-shrink:0;}
  .chip .toast{
    position:absolute;bottom:calc(100% + 6px);left:50%;
    transform:translateX(-50%);
    background:var(--ink);color:var(--paper-2);
    font-size:11px;padding:4px 9px;border-radius:4px;
    white-space:nowrap;opacity:0;pointer-events:none;
    transition:opacity .15s;
    font-family:var(--font-mono);
  }
  .chip .toast.show{opacity:1;}

  /* ---------- sections ---------- */
  section{margin-bottom:44px;}
  .sec-title{
    font-family:var(--font-mono);
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--brass);
    margin:0 0 16px;
    display:flex;align-items:center;gap:10px;
  }
  .sec-title::after{content:"";flex:1;height:1px;background:var(--line-strong);}
  .about-text{font-size:15px;line-height:1.75;color:var(--ink);max-width:64ch;}

  .pairs{margin:0 0 18px;padding:0;list-style:none;}
  .pairs li{
    font-size:14px;padding:9px 0;
    border-bottom:1px solid var(--line);
    display:flex;gap:10px;
  }
  .pairs li:last-child{border-bottom:none;}
  .pairs li::before{content:"›";color:var(--seal);font-weight:600;}

  .tags{display:flex;flex-wrap:wrap;gap:8px;}
  .tag{
    font-size:12.5px;padding:6px 12px;border-radius:999px;
    background:var(--paper-2);border:1px solid var(--line-strong);
    color:var(--ink-soft);
  }

  /* ledger rows for experience/education */
  .ledger-row{
    display:grid;grid-template-columns:118px 1fr;gap:18px;
    padding:16px 0;border-bottom:1px solid var(--line);
  }
  .ledger-row:last-child{border-bottom:none;}
  .ledger-date{
    font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);
    padding-top:2px;
  }
  .ledger-org{font-size:13px;color:var(--teal);font-weight:500;margin:0 0 2px;}
  .ledger-role{font-size:14.5px;font-weight:600;margin:0 0 6px;color:var(--ink);}
  .ledger-bullet{font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin:0;}

  /* projects */
  .projects{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .project{
    background:var(--paper-2);border:1px solid var(--line-strong);
    border-radius:6px;padding:16px 18px;
  }
  .project-title{font-size:14.5px;font-weight:600;margin:0 0 3px;color:var(--ink);}
  .project-org{font-family:var(--font-mono);font-size:10.5px;color:var(--seal);margin:0 0 6px;letter-spacing:.03em;}
  .project-lang{font-family:var(--font-mono);font-size:10.5px;color:var(--brass);margin:0 0 8px;letter-spacing:.03em;}
  .project-desc{font-size:13px;color:var(--ink-soft);line-height:1.55;margin:0;}

  footer{
    border-top:1px solid var(--line-strong);
    padding-top:28px;
  }
  .footer-title{font-family:var(--font-display);font-size:22px;font-weight:600;margin:0 0 6px;}
  .footer-text{font-size:14px;color:var(--ink-soft);margin:0 0 20px;}

  @media (max-width:560px){
    .wrap{padding:32px 16px 60px;}
    .badge-inner{flex-direction:column;text-align:center;}
    .badge-code{flex-direction:column;gap:4px;}
    .projects{grid-template-columns:1fr;}
    .ledger-row{grid-template-columns:1fr;gap:4px;}
  }

  
  @media print {
    @page { size: A4; margin: 8mm 12mm; }
    body{background:#fff; background-image:none;}
    .wrap{max-width:100%; padding:0;}
    .langbar{display:none;}
    .badge{padding:10px 14px 8px; margin-bottom:4px;}
    .badge-inner{padding:10px 12px; gap:12px;}
    .badge-photo{width:60px; height:60px;}
    .name{font-size:21px; margin:4px 0 1px;}
    .name-secondary{font-size:12px; margin:0 0 3px;}
    .role{font-size:12px; margin:0 0 2px;}
    .tagline{font-size:10.5px; line-height:1.3;}
    .badge-code{font-size:8px; margin-top:6px; padding-top:5px;}
    .contacts{margin:8px 0 10px; gap:5px;}
    .chip{font-size:10px; padding:3px 9px 3px 7px;}
    .chip svg{width:11px; height:11px;}
    section{margin-bottom:9px !important;}
    .sec-title{font-size:10px !important; margin:0 0 5px !important; letter-spacing:.08em !important;}
    .about-text{font-size:10px !important; line-height:1.35 !important;}
    .pairs{margin:0 0 8px !important;}
    .pairs li{font-size:10px !important; padding:3px 0 !important;}
    .tags{gap:4px !important;}
    .tag{font-size:8.5px !important; padding:3px 8px !important;}
    .ledger-row{grid-template-columns:82px 1fr !important; gap:9px !important; padding:7px 0 !important;}
    .ledger-date{font-size:9px !important;}
    .ledger-org{font-size:10.5px !important; margin:0 !important;}
    .ledger-role{font-size:11px !important; margin:0 0 2px !important;}
    .ledger-bullet{font-size:9.5px !important; line-height:1.35 !important;}
    .projects{gap:7px !important;}
    .project{padding:9px !important;}
    .project-title{font-size:11px !important; margin:0 0 1px !important;}
    .project-org{font-size:8.5px !important; margin:0 0 3px !important;}
    .project-desc{font-size:9.5px !important; line-height:1.35 !important;}
    footer{padding-top:9px !important;}
    .footer-title{font-size:15px !important; margin:0 0 3px !important;}
    .footer-text{font-size:10px !important; margin:0 0 8px !important;}
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>

function renderLang(lang){
  const d = DATA[lang];
  document.documentElement.setAttribute('data-lang', lang);
  document.documentElement.setAttribute('lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if (d[key] !== undefined) el.textContent = d[key];
  });
  document.querySelectorAll('.langbtn').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang-btn')===lang);
  });

  const pairsEl = document.getElementById('pairsList');
  pairsEl.innerHTML = d.pairs.map(p=>`<li>${p}</li>`).join('');

  const tagsEl = document.getElementById('tagsList');
  tagsEl.innerHTML = d.tags.map(t=>`<span class="tag">${t}</span>`).join('');

  const expEl = document.getElementById('expList');
  expEl.innerHTML = d.exp.map(e=>`
    <div class="ledger-row">
      <div class="ledger-date">${e.date}</div>
      <div>
        <p class="ledger-org">${e.org}</p>
        <p class="ledger-role">${e.role}</p>
        <p class="ledger-bullet">${e.bullet}</p>
      </div>
    </div>`).join('');

  const projEl = document.getElementById('projList');
  projEl.innerHTML = d.proj.map(p=>`
    <div class="project">
      <p class="project-title">${p.title}</p>
      <p class="project-org">${p.org}</p>
      <p class="project-desc">${p.desc}</p>
    </div>`).join('');

  const personalEl = document.getElementById('personalList');
  personalEl.innerHTML = d.personal.map(p=>`
    <div class="project">
      <p class="project-title">${p.title}</p>
      <p class="project-org">${p.org}</p>
      <p class="project-desc">${p.desc}</p>
    </div>`).join('');

  const eduEl = document.getElementById('eduList');
  eduEl.innerHTML = d.edu.map(e=>`
    <div class="ledger-row">
      <div class="ledger-date">${e.date}</div>
      <div>
        <p class="ledger-org">${e.org}</p>
        <p class="ledger-role">${e.degree}</p>
        <p class="ledger-bullet">${e.note}</p>
      </div>
    </div>`).join('');

  const certEl = document.getElementById('certList');
  certEl.innerHTML = d.certs.map(c=>`<span class="tag">${c}</span>`).join('');
}

document.querySelectorAll('.langbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>renderLang(btn.getAttribute('data-lang-btn')));
});

document.getElementById('wechatChip').addEventListener('click', ()=>{
  navigator.clipboard.writeText('zay_eve').catch(()=>{});
  const t = document.getElementById('wechatToast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
});

renderLang('ru');
